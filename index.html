<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>scroll hero · cute coffee touch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="relative">
    <section class="hero" id="heroSection">
      <div class="container-custom w-full relative z-10">
        <!-- floating   cute images => coffee and pastry -->
        <div class="absolute left-[5%] top-[15%] opacity-70 rotate-6 w-16 md:w-20 cute-float">
          <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='55' r='32' fill='%23d9b48b' /%3E%3Crect x='30' y='25' width='40' height='24' rx='12' fill='%23a5673f' /%3E%3Ccircle cx='50' cy='65' r='8' fill='%23f2d8b3' /%3E%3Cpath d='M20 60 L35 70 L30 80 L15 70 Z' fill='%23c48a5c' /%3E%3C/svg%3E" alt="cute coffee cup" class="w-full drop-shadow-xl">
        </div>
        <div class="absolute right-[8%] bottom-[25%] opacity-60 -rotate-3 w-14 md:w-20 cute-float-delay">
          <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='40' fill='%23f3d9b1' /%3E%3Ccircle cx='30' cy='40' r='8' fill='%23945e3f' /%3E%3Ccircle cx='70' cy='40' r='8' fill='%23945e3f' /%3E%3Cpath d='M30 65 Q50 80, 70 65' stroke='%23754c24' stroke-width='5' fill='none' /%3E%3C/svg%3E" alt="cute cookie" class="w-full drop-shadow-xl">
        </div>

        <div class="headline flex flex-wrap justify-center mb-8 will-change-transform" id="heroHeadline">
          <span>W</span><span> </span><span>E</span><span> </span><span>L</span><span> </span><span>C</span><span> </span><span>O</span><span> </span><span>M</span><span> </span><span>E</span><span> </span><span> </span><span>I</span><span> </span><span>T</span><span> </span><span>Z</span><span> </span><span>F</span><span> </span><span>I</span><span> </span><span>Z</span><span> </span><span>Z</span>
        </div>
        <div class="handmade-line mx-auto"></div>

        <div class="flex flex-wrap justify-center gap-4 md:gap-8 mt-10" id="statsGroup">
          <div class="stat-item flex items-center gap-3">
            <span class="stat-number">84%</span>
            <span class="stat-label">happier scrolls</span>
          </div>
          <div class="stat-item flex items-center gap-3 relative">
            <span class="stat-number">2.4k</span>
            <span class="stat-label">smooth moves</span>
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='22' r='14' fill='%23f1c6a5' /%3E%3Ccircle cx='12' cy='18' r='3' fill='%233d2f22' /%3E%3Ccircle cx='28' cy='18' r='3' fill='%233d2f22' /%3E%3Cpath d='M12 28 Q20 34, 28 28' stroke='%23945e3f' stroke-width='3' fill='none' /%3E%3C/svg%3E" alt="smiley" class="absolute -top-3 -right-3 w-8 h-8 drop-shadow">
          </div>
          <div class="stat-item flex items-center gap-3">
            <span class="stat-number">12</span>
            <span class="stat-label">coffee breaks</span>
          </div>
        </div>

        <div class="flex justify-center mt-16 md:mt-20 will-change-transform" id="scrollVisual">
          <div class="visual-scroll-element"></div>
        </div>

       <!-- tiny coffe bean -->
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3E%3Cellipse cx='15' cy='15' rx='10' ry='6' fill='%236b4f32' /%3E%3Cellipse cx='17' cy='13' rx='3' ry='2' fill='%23967854' /%3E%3C/svg%3E" class="absolute left-[20%] bottom-[10%] w-6 opacity-40 rotate-12" alt="bean">
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3E%3Cellipse cx='15' cy='15' rx='10' ry='6' fill='%236b4f32' /%3E%3Cellipse cx='17' cy='13' rx='3' ry='2' fill='%23967854' /%3E%3C/svg%3E" class="absolute right-[15%] top-[30%] w-5 opacity-30 -rotate-12" alt="bean">
      </div>
    </section>

    <div class="spacer flex items-end justify-center pb-20">
      <div class="bg-[#ead8c4] p-5 rounded-full shadow-md rotate-2 flex gap-2 items-center">
        <i class="bi bi-arrow-down text-3xl" style="color:#7b5f48;"></i>
        <span class="text-sm text-[#7b5f48] italic">scroll more ↓</span>
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3E%3Ccircle cx='15' cy='15' r='12' fill='%23b37b5e' /%3E%3Ccircle cx='10' cy='12' r='2' fill='%23ffffff' /%3E%3Ccircle cx='20' cy='12' r='2' fill='%23ffffff' /%3E%3Cpath d='M8 21 Q15 25, 22 21' stroke='%23945e3f' stroke-width='3' fill='none' /%3E%3C/svg%3E" class="w-8 h-8" alt="cute face">
      </div>
    </div>

    <footer class="footer-note py-4">
      <div class="container-custom flex justify-between items-center flex-wrap gap-3">
        <span class="text-[#614d3b] text-sm italic flex items-center gap-1">
           handcrafted with curiosity
          <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20'%3E%3Ccircle cx='10' cy='10' r='6' fill='%23d99b6b' /%3E%3Ccircle cx='6' cy='8' r='1.5' fill='%233d2f22' /%3E%3Ccircle cx='14' cy='8' r='1.5' fill='%233d2f22' /%3E%3C/svg%3E" class="w-5 h-5" alt="smile">
        </span>
        <a href="https://paraschaturvedi.github.io/car-scroll-animation" target="_blank" class="love-link inline-flex items-center gap-2 no-underline">
          <i class="bi bi-heart-fill"></i> live demo · love link
          <i class="bi bi-box-arrow-up-right ms-1"></i>
        </a>
        <span class="text-[#614d3b] text-xs flex items-center gap-1">
          © itzfizz / warm tones
          <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20'%3E%3Cpath d='M4 8 Q10 0, 16 8 Q10 16, 4 8' fill='%23c49a6c' /%3E%3Ccircle cx='10' cy='6' r='2' fill='%23945e3f' /%3E%3C/svg%3E" class="w-4 h-4 opacity-70" alt="coffee bean">
        </span>
      </div>
    </footer>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
